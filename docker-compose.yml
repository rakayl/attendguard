version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AttendGuard — Docker Compose Stack
#
# Quick start:
#   1. cp .env.example .env
#   2. Edit .env (change DB_PASS and JWT_SECRET)
#   3. docker compose up -d
#   4. Open http://localhost:3000
#      Login: admin@company.com / admin123
#
# Migration commands:
#   docker compose run --rm migrate status
#   docker compose run --rm migrate up
#   docker compose run --rm migrate down [n]
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attendguard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-postgres}
      POSTGRES_DB:       ${DB_NAME:-attendance_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-attendance_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s

  # ── Backend API server ─────────────────────────────────────────────────────
  # Runs database migrations automatically on startup.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendguard_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT:            8080
      DB_HOST:         postgres
      DB_PORT:         5432
      DB_USER:         ${DB_USER:-postgres}
      DB_PASS:         ${DB_PASS:-postgres}
      DB_NAME:         ${DB_NAME:-attendance_db}
      JWT_SECRET:      ${JWT_SECRET:-change-this-to-a-64-char-random-secret!!}
      OFFICE_LAT:      ${OFFICE_LAT:--6.200000}
      OFFICE_LONG:     ${OFFICE_LONG:-106.816666}
      GEOFENCE_RADIUS: ${GEOFENCE_RADIUS:-200}
      GIN_MODE:        ${GIN_MODE:-release}
    ports:
      - "${API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health | grep -c '\"ok\"' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 6
      start_period: 30s

  # ── Migration CLI (on-demand, not always-running) ──────────────────────────
  # Usage:
  #   docker compose run --rm migrate status
  #   docker compose run --rm migrate up
  #   docker compose run --rm migrate down
  #   docker compose run --rm migrate fresh     (⚠ dev only)
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendguard_migrate
    entrypoint: ["./migrate"]
    command: ["up"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASS: ${DB_PASS:-postgres}
      DB_NAME: ${DB_NAME:-attendance_db}
    profiles:
      - tools

  # ── Frontend (nginx serving React SPA + proxying API) ─────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL:         /api
        VITE_OFFICE_LAT:      ${OFFICE_LAT:--6.200000}
        VITE_OFFICE_LNG:      ${OFFICE_LONG:-106.816666}
        VITE_GEOFENCE_RADIUS: ${GEOFENCE_RADIUS:-200}
    container_name: attendguard_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:80"

volumes:
  pg_data:
    name: attendguard_pg_data

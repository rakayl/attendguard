version: "3.9"

services:

  # ─────────────────────────────────────────
  # 🐘 PostgreSQL
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: attendguard_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: absensi_db
    ports:
      - "55:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d absensi_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────
  # ⚙️ Backend (Golang API)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendguard_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 1001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: absensi_db
      JWT_SECRET: super-secret
      GIN_MODE: release
    ports:
      - "1001:1001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:1001/health | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # 🛠 Migration CLI (optional)
  # ─────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: attendguard_migrate
    entrypoint: ["./migrate"]
    command: ["up"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: absensi_db
    profiles:
      - tools

  # ─────────────────────────────────────────
  # 🌐 Frontend (React + Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: attendguard_web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "9000:80"

volumes:
  pg_data:
    name: attendguard_pg_data
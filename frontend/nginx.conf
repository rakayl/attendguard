server {
    listen 80;
    server_name _;

    # Root React build
    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────
    # GZIP (performance)
    # ─────────────────────────────────────────
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        application/xml+rss
        text/javascript;

    # ─────────────────────────────────────────
    # React SPA (routing fallback)
    # ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─────────────────────────────────────────
    # API → Golang Backend (FIX UTAMA DI SINI)
    # ─────────────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8080/api/;

        proxy_http_version 1.1;

        # WebSocket support (optional tapi aman)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout (biar tidak gampang 502 lagi)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Disable cache untuk API
        proxy_cache_bypass $http_upgrade;
    }

    # ─────────────────────────────────────────
    # Static assets (cache optimasi)
    # ─────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─────────────────────────────────────────
    # Security headers (optional tapi bagus)
    # ─────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}